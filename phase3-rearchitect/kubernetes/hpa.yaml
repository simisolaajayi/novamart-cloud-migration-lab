# Horizontal Pod Autoscaler — automatically scales pods based on CPU usage
# This is the cloud-native equivalent of "buying more servers when it gets busy"
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: novamart-hpa
  namespace: novamart-ns
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: novamart-inventory
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
